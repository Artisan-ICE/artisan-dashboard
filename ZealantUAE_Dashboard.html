<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cash Flow — Artisan Ice Co.</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <style>
    /* ── CONFIGURATION ─────────────────────────────────────────────────────
   Before uploading to SharePoint, fill in these 3 values:
   1. CLIENT_ID   — Azure App Registration client ID
   2. TENANT_ID   — Your Microsoft 365 tenant ID
   3. FILE_ID     — SharePoint file ID (from the Excel URL in OneDrive)
   See SETUP INSTRUCTIONS at the bottom of this file.
──────────────────────────────────────────────────────────────────────── */

    :root {
      --black: #000000;
      --white: #ffffff;
      --ice: #8ECAE6;
      /* kept for logo only */
      --ice-dim: #5ba4c8;
      --ice-dark: #1a3a4a;
      --gold: #c9a84c;
      --red: #e05c5c;
      --green: #7ec8a0;
      --amber: #e8a838;
      --surface: #0d0d0d;
      --border: rgba(255, 255, 255, 0.1);
      --text: #e8e8e8;
      --text-dim: #666666;
      --serif: "Times New Roman", serif;
      --sans: "Nunito Sans", sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--black);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE TEXTURE ───────────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 32px 60px;
    }

    /* ── HEADER ──────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 40px 0 32px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 40px;
    }

    .header-logo {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .logo-box {
      border: 1px solid var(--ice);
      padding: 10px 14px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .logo-text {
      font-family: var(--serif);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1.5;
    }

    .header-title h1 {
      font-family: var(--serif);
      font-size: 2.4rem;
      font-weight: 400;
      color: var(--white);
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .header-title h1 em {
      font-style: italic;
      color: var(--ice);
    }

    .header-right {
      text-align: right;
    }

    .sync-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .sync-time {
      font-family: var(--serif);
      font-size: 13px;
      color: var(--white);
    }

    .live-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--ice);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.3;
        transform: scale(0.7);
      }
    }

    /* ── ALERT BAR ───────────────────────────────────────────────────────── */
    .alert-bar {
      border: 1px solid rgba(224, 92, 92, 0.4);
      background: rgba(224, 92, 92, 0.05);
      padding: 16px 24px;
      margin-bottom: 32px;
      display: flex;
      gap: 40px;
      align-items: center;
    }

    .alert-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .alert-label {
      font-size: 8px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--red);
    }

    .alert-value {
      font-family: var(--serif);
      font-size: 1.2rem;
      color: var(--red);
    }

    .alert-sub {
      font-size: 10px;
      color: var(--text-dim);
    }

    .alert-note {
      margin-left: auto;
      font-size: 10px;
      color: rgba(224, 92, 92, 0.7);
      letter-spacing: 0.05em;
    }

    /* ── KPI GRID ────────────────────────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .kpi {
      background: var(--black);
      padding: 28px 24px;
      position: relative;
      transition: background 0.2s;
    }

    .kpi:hover {
      background: rgba(255, 255, 255, 0.02);
    }

    .kpi::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
    }

    .kpi.ice::after {
      background: var(--white);
    }

    .kpi.white::after {
      background: var(--white);
    }

    .kpi.green::after {
      background: var(--green);
    }

    .kpi.red::after {
      background: var(--red);
    }

    .kpi.gold::after {
      background: var(--gold);
    }

    .kpi-label {
      font-size: 8px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .kpi-value {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 400;
      line-height: 1;
      margin-bottom: 8px;
    }

    .kpi-value.ice {
      color: var(--white);
    }

    .kpi-value.white {
      color: var(--white);
    }

    .kpi-value.green {
      color: var(--green);
    }

    .kpi-value.red {
      color: var(--red);
    }

    .kpi-value.gold {
      color: var(--gold);
    }

    .kpi-sub {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    /* ── CHART PANELS ────────────────────────────────────────────────────── */
    .chart-panel {
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 24px;
      position: relative;
    }

    .panel-title {
      font-size: 8px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .panel-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .chart-hint {
      font-size: 8px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-align: right;
      margin-top: -18px;
      margin-bottom: 10px;
    }

    /* ── TWO COLUMN ──────────────────────────────────────────────────────── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    /* ── BANK ACCOUNTS ───────────────────────────────────────────────────── */
    .bank-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
    }

    .bank-item {
      background: var(--black);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .bank-name {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    .bank-balance {
      font-family: var(--serif);
      font-size: 1.1rem;
      color: var(--white);
    }

    /* ── DATA TABLES ─────────────────────────────────────────────────────── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .data-table th {
      text-align: left;
      padding: 8px 12px;
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 400;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .data-table td {
      padding: 11px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      color: var(--text);
      vertical-align: middle;
    }

    .data-table tr:last-child td {
      border-bottom: none;
    }

    .data-table tr:hover td {
      background: rgba(255, 255, 255, 0.02);
    }

    .td-main {
      font-size: 11px;
    }

    .td-sub {
      font-size: 9px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 8px;
      letter-spacing: 0.1em;
      border: 1px solid;
    }

    .badge.overdue {
      border-color: rgba(224, 92, 92, 0.5);
      color: var(--red);
      background: rgba(224, 92, 92, 0.05);
    }

    .badge.soon {
      border-color: rgba(232, 168, 56, 0.5);
      color: var(--amber);
      background: rgba(232, 168, 56, 0.05);
    }

    .badge.ok {
      border-color: rgba(126, 200, 160, 0.5);
      color: var(--green);
      background: rgba(126, 200, 160, 0.05);
    }

    .amount-in {
      color: var(--green);
      font-family: var(--serif);
    }

    .amount-out {
      color: var(--red);
      font-family: var(--serif);
    }

    .amount-ice {
      color: var(--white);
      font-family: var(--serif);
    }

    /* ── LOADING ─────────────────────────────────────────────────────────── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      gap: 20px;
    }

    .loading-box {
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 20px;
    }

    .loading-text {
      font-family: var(--serif);
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--white);
    }

    .loading-sub {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-align: center;
    }

    /* ── LOGIN SCREEN ────────────────────────────────────────────────────── */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 80vh;
      gap: 24px;
    }

    .login-title {
      font-family: var(--serif);
      font-size: 1.8rem;
      color: var(--white);
      letter-spacing: -0.01em;
    }

    .login-title em {
      font-style: italic;
      color: var(--white);
    }

    .login-sub {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-align: center;
      max-width: 320px;
      line-height: 2;
    }

    .login-btn {
      border: 1px solid var(--white);
      background: transparent;
      color: var(--white);
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 14px 32px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-btn:hover {
      background: var(--white);
      color: var(--black);
    }

    /* ── MODAL ───────────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      border: 1px solid var(--border);
      background: var(--surface);
      width: 560px;
      max-width: calc(100vw - 40px);
      max-height: calc(100vh - 80px);
      overflow-y: auto;
      transform: translateY(16px);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }

    .modal-header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .modal-date {
      font-family: var(--serif);
      font-size: 1.3rem;
      color: var(--white);
      font-style: italic;
    }

    .modal-meta {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      margin-top: 4px;
    }

    .modal-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .modal-close:hover {
      border-color: var(--white);
      color: var(--white);
    }

    .modal-stats {
      display: flex;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .modal-stat {
      flex: 1;
      padding: 14px 20px;
      border-right: 1px solid var(--border);
    }

    .modal-stat:last-child {
      border-right: none;
    }

    .modal-stat-label {
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .modal-stat-value {
      font-family: var(--serif);
      font-size: 1rem;
    }

    .modal-body {
      padding: 20px 24px;
    }

    .modal-section-title {
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 10px;
      margin-top: 16px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .modal-section-title:first-child {
      margin-top: 0;
    }

    .modal-empty {
      font-size: 10px;
      color: var(--text-dim);
      padding: 12px 0;
      letter-spacing: 0.05em;
    }

    .modal-net-bar {
      margin-top: 16px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-net-label {
      font-size: 9px;
      color: var(--text-dim);
    }

    .modal-net-value {
      font-family: var(--serif);
      font-size: 1rem;
    }

    /* ── RESPONSIVE ──────────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .kpi-grid {
        grid-template-columns: 1fr 1fr;
      }

      .two-col {
        grid-template-columns: 1fr;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
    }

    @media (max-width: 500px) {
      .kpi-grid {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 0 16px 40px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div id="app">
      <div class="loading">
        <div class="loading-box">
          <div class="loading-text">Loading</div>
        </div>
        <div class="loading-sub">Initialising dashboard</div>
      </div>
    </div>
  </div>

  <!-- Day detail modal -->
  <div class="modal-overlay" id="dayModal">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-date" id="modalDate">—</div>
          <div class="modal-meta" id="modalMeta">—</div>
        </div>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-stats" id="modalStats"></div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════════════
    // CONFIGURATION — FILL THESE IN BEFORE UPLOADING TO SHAREPOINT
    // ═══════════════════════════════════════════════════════════════════════

    const CONFIG = {
      // Azure App Registration — must have Files.Read or Sites.Read.All permission
      CLIENT_ID: '7fac838d-cace-4a69-822d-64db84c8a494',
      TENANT_ID: '07b046b3-6a82-4b7b-a260-d152326e558f',

      // SharePoint / OneDrive file
      // Get from the Excel URL: sourcedoc=%7BXXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX%7D
      // Decode the %7B and %7D (they are { and })
      FILE_ID: 'AB813CEA-49C8-4B16-AF2A-D0EB368F5E5D',

      // Drive ID from your Power Automate flow
      DRIVE_ID: 'b!Yu_GdB9_zUyCHoaXZOr7VPo5LcETvW1ElxX_aIwAk5siEXTO4qIeQK0XXlByz4mz',

      // Sheet + table names
      SHEETS: {
        projection: 'Projection',
        receivables: 'Receivables',
        payables: 'Payables',
        bank: 'BankBalances',
        config: 'Config'
      }
    };

    // ═══════════════════════════════════════════════════════════════════════
    // MICROSOFT GRAPH AUTH
    // ═══════════════════════════════════════════════════════════════════════

    let accessToken = null;

    async function signIn() {
      const MSAL_URL = 'https://cdnjs.cloudflare.com/ajax/libs/msal-browser/3.22.0/msal-browser.min.js';
      await loadScript(MSAL_URL);

      const msalConfig = {
        auth: {
          clientId: CONFIG.CLIENT_ID,
          authority: `https://login.microsoftonline.com/${CONFIG.TENANT_ID}`,
          redirectUri: window.location.href.split('?')[0]
        },
        cache: {
          cacheLocation: 'localStorage',
          storeAuthStateInCookie: true
        }
      };

      const msalInstance = new msal.PublicClientApplication(msalConfig);
      await msalInstance.initialize();

      // Check cached accounts first — silent token
      const accounts = msalInstance.getAllAccounts();
      if (accounts.length > 0) {
        try {
          const silentResult = await msalInstance.acquireTokenSilent({
            scopes: ['Files.Read'],
            account: accounts[0]
          });
          accessToken = silentResult.accessToken;
          return true;
        } catch (e) {
          // Silent failed — fall through to popup
        }
      }

      // Show sign in screen with popup trigger
      showLoginScreen(msalInstance);
      return false;
    }

    function showLoginScreen(msalInstance) {
      document.getElementById('app').innerHTML = `
    <div class="login-screen">
      <div class="logo-box" style="margin-bottom:8px">
        <div class="logo-text">ARTISAN<br>ICE CO.</div>
      </div>
      <div class="login-title"><em>Cash Flow</em> Intelligence</div>
      <div class="login-sub">Sign in with your Microsoft 365 account to access the live cash flow dashboard.</div>
      <button class="login-btn" id="signInBtn" onclick="window._msalLogin()">
        Sign in with Microsoft
      </button>
      <div id="loginError" style="font-size:9px;color:var(--red);margin-top:12px;letter-spacing:0.1em;display:none"></div>
    </div>
  `;
      window._msalLogin = async () => {
        const btn = document.getElementById('signInBtn');
        btn.textContent = 'Signing in...';
        btn.disabled = true;
        try {
          const result = await msalInstance.loginPopup({
            scopes: ['Files.Read']
          });
          accessToken = result.accessToken;
          const data = await loadAllData();
          render(data);
        } catch (e) {
          btn.textContent = 'Sign in with Microsoft';
          btn.disabled = false;
          const err = document.getElementById('loginError');
          err.style.display = 'block';
          err.textContent = 'Sign in failed: ' + (e.message || String(e));
        }
      };
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    // ═══════════════════════════════════════════════════════════════════════
    // GRAPH API — READ EXCEL SHEETS
    // ═══════════════════════════════════════════════════════════════════════

    async function graphGet(path) {
      const res = await fetch(`https://graph.microsoft.com/v1.0${path}`, {
        headers: { Authorization: `Bearer ${accessToken}` }
      });
      if (!res.ok) throw new Error(`Graph API error ${res.status}: ${await res.text()}`);
      return res.json();
    }

    async function getSheetRange(sheetName, range) {
      const path = `/drives/${CONFIG.DRIVE_ID}/items/${CONFIG.FILE_ID}/workbook/worksheets/${sheetName}/range(address='${range}')`;
      const data = await graphGet(path);
      return data.values || [];
    }

    async function getUsedRange(sheetName) {
      const path = `/drives/${CONFIG.DRIVE_ID}/items/${CONFIG.FILE_ID}/workbook/worksheets/${sheetName}/usedRange`;
      const data = await graphGet(path);
      return data.values || [];
    }

    // ═══════════════════════════════════════════════════════════════════════
    // DATA LOADING
    // ═══════════════════════════════════════════════════════════════════════

    async function loadAllData() {
      showLoading('Reading Excel data from SharePoint...');

      const [projData, recData, payData, bankData, cfgData] = await Promise.all([
        getUsedRange(CONFIG.SHEETS.projection),
        getUsedRange(CONFIG.SHEETS.receivables),
        getUsedRange(CONFIG.SHEETS.payables),
        getUsedRange(CONFIG.SHEETS.bank),
        getUsedRange(CONFIG.SHEETS.config)
      ]);

      return { projData, recData, payData, bankData, cfgData };
    }

    function parseRows(data) {
      if (!data || data.length < 2) return { headers: [], rows: [] };
      const headers = data[0];
      const rows = data.slice(1).map(row => {
        const obj = {};
        headers.forEach((h, i) => obj[h] = row[i]);
        return obj;
      });
      return { headers, rows };
    }

    // ═══════════════════════════════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════════════════════════════

    function fmt(n) {
      const abs = Math.abs(Number(n) || 0);
      if (abs >= 1000000) return 'AED ' + (abs / 1000000).toFixed(2) + 'M';
      if (abs >= 1000) return 'AED ' + (abs / 1000).toFixed(1) + 'K';
      return 'AED ' + abs.toLocaleString('en-AE', { maximumFractionDigits: 0 });
    }

    function fmtFull(n) {
      return 'AED ' + Math.abs(Number(n) || 0).toLocaleString('en-AE', { maximumFractionDigits: 0 });
    }

    function dayBadge(days) {
      const d = Number(days) || 0;
      if (d < 0) return `<span class="badge overdue">Overdue ${Math.abs(d)}d</span>`;
      if (d <= 7) return `<span class="badge soon">Due in ${d}d</span>`;
      return `<span class="badge ok">Due in ${d}d</span>`;
    }

    function statusColor(status) {
      if (status === 'Critical') return 'red';
      if (status === 'Warning') return 'amber';
      return 'green';
    }

    // ═══════════════════════════════════════════════════════════════════════
    // MODAL
    // ═══════════════════════════════════════════════════════════════════════

    let _projRows = [];

    function openModal(idx) {
      const p = _projRows[idx];
      if (!p) return;

      const balColor = statusColor(p.BalanceStatus);

      document.getElementById('modalDate').innerHTML = `<em>${p.Date || '—'}</em>`;
      document.getElementById('modalMeta').textContent = `Day ${p.DayOffset} · ${p.BalanceStatus}`;

      const dIn = Number(p.DailyReceivables) || 0;
      const dOut = Number(p.DailyPayables) || 0;
      const dRec = Number(p.DailyRecurring) || 0;
      const net = Number(p.NetDailyChange) || 0;
      const bal = Number(p.ProjectedBalance) || 0;

      document.getElementById('modalStats').innerHTML = `
    <div class="modal-stat"><div class="modal-stat-label">Projected Balance</div>
      <div class="modal-stat-value" style="color:var(--${balColor})">${fmtFull(bal)}</div></div>
    <div class="modal-stat"><div class="modal-stat-label">Cash In</div>
      <div class="modal-stat-value amount-in">${dIn > 0 ? '+' + fmtFull(dIn) : '—'}</div></div>
    <div class="modal-stat"><div class="modal-stat-label">Cash Out</div>
      <div class="modal-stat-value amount-out">${(dOut + dRec) > 0 ? '−' + fmtFull(dOut + dRec) : '—'}</div></div>
  `;

      const netClass = net > 0 ? 'amount-in' : net < 0 ? 'amount-out' : '';
      const netPrefix = net > 0 ? '+' : net < 0 ? '−' : '';

      let body = '';
      if (dRec > 0) {
        body += `<div class="modal-section-title">Recurring expenses</div>
      <div style="font-size:10px;color:var(--text-dim);padding:8px 0;">AED ${dRec.toLocaleString()} in fixed costs this day</div>`;
      }

      if (dIn === 0 && dOut === 0 && dRec === 0) {
        body += `<div class="modal-empty">No cash movements this day</div>`;
      }

      if (dIn > 0 || dOut > 0) {
        body += `
      <div class="modal-net-bar">
        <div>
          <div class="modal-net-label">Net movement</div>
        </div>
        <div class="modal-net-value ${netClass}">${netPrefix}${fmtFull(Math.abs(net))}</div>
      </div>`;
      }

      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('dayModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('dayModal').classList.remove('open');
    }

    document.getElementById('dayModal').addEventListener('click', e => {
      if (e.target === document.getElementById('dayModal')) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ═══════════════════════════════════════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════════════════════════════════════

    function showLoading(msg) {
      document.getElementById('app').innerHTML = `
    <div class="loading">
      <div class="loading-box"><div class="loading-text">Loading</div></div>
      <div class="loading-sub">${msg}</div>
    </div>`;
    }

    function render(data) {
      const proj = parseRows(data.projData).rows;
      const rec = parseRows(data.recData).rows;
      const pay = parseRows(data.payData).rows;
      const bank = parseRows(data.bankData).rows;
      const cfg = parseRows(data.cfgData).rows;

      _projRows = proj;

      // Config values
      const cfgMap = {};
      cfg.forEach(r => { cfgMap[r.SETTING || r.Setting || Object.values(r)[0]] = Object.values(r)[1]; });
      const lastSync = cfgMap['LastSyncTime'] || '—';

      // KPI calculations
      const totalRec = rec.reduce((s, r) => s + (Number(r.BalanceAmount) || 0), 0);
      const totalPay = pay.reduce((s, r) => s + (Number(r.BalanceAmount) || 0), 0);
      const bankBal = bank.reduce((s, r) => s + (Number(r.CurrentBalance) || 0), 0);
      const netPos = bankBal + totalRec - totalPay;
      const minBal = Math.min(...proj.map(p => Number(p.ProjectedBalance) || 0));
      const overdueRec = rec.filter(r => Number(r.DaysUntilDue) < 0);
      const overduePay = pay.filter(r => Number(r.DaysUntilDue) < 0);
      const hasOverdue = overdueRec.length > 0 || overduePay.length > 0;

      // Chart data
      const labels = proj.map(p => p.Date || '');
      const balances = proj.map(p => Number(p.ProjectedBalance) || 0);
      const cashIn = proj.map(p => Number(p.DailyReceivables) || 0);
      const cashOut = proj.map(p => -(Number(p.DailyPayables) + Number(p.DailyRecurring) || 0));

      const balColor = bankBal < 50000 ? 'red' : bankBal < 150000 ? 'gold' : 'white';
      const netColor = netPos >= 0 ? 'green' : 'red';

      // Format last sync
      let syncDisplay = '—';
      try {
        if (lastSync && lastSync !== '—') {
          syncDisplay = new Date(lastSync).toLocaleString('en-AE', {
            timeZone: 'Asia/Dubai',
            day: '2-digit', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
          });
        }
      } catch (e) { syncDisplay = String(lastSync); }

      // Top receivables / payables
      const topRec = [...rec].sort((a, b) => (Number(b.BalanceAmount) || 0) - (Number(a.BalanceAmount) || 0)).slice(0, 6);
      const topPay = [...pay].sort((a, b) => (Number(b.BalanceAmount) || 0) - (Number(a.BalanceAmount) || 0)).slice(0, 6);

      document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-logo">
        <div class="logo-box"><div class="logo-text">ARTISAN<br>ICE CO.</div></div>
        <div class="header-title">
          <h1><em>Cash Flow</em> Intelligence</h1>
        </div>
      </div>
      <div class="header-right">
        <div class="sync-label"><span class="live-dot"></span>Last sync</div>
        <div class="sync-time">${syncDisplay}</div>
      </div>
    </div>

    ${hasOverdue ? `
    <div class="alert-bar">
      <div class="alert-item">
        <div class="alert-label">Overdue Receivables</div>
        <div class="alert-value">${fmt(overdueRec.reduce((s, r) => s + (Number(r.BalanceAmount) || 0), 0))}</div>
        <div class="alert-sub">${overdueRec.length} invoice(s) past due</div>
      </div>
      <div class="alert-item">
        <div class="alert-label">Overdue Payables</div>
        <div class="alert-value">${fmt(overduePay.reduce((s, r) => s + (Number(r.BalanceAmount) || 0), 0))}</div>
        <div class="alert-sub">${overduePay.length} bill(s) past due</div>
      </div>
      <div class="alert-note">Reflected in today's projection</div>
    </div>` : ''}

    <div class="kpi-grid">
      <div class="kpi ${balColor}">
        <div class="kpi-label">Bank Balance</div>
        <div class="kpi-value ${balColor}">${fmt(bankBal)}</div>
        <div class="kpi-sub">Across ${bank.length} account(s)</div>
      </div>
      <div class="kpi green">
        <div class="kpi-label">Total Receivables</div>
        <div class="kpi-value green">${fmt(totalRec)}</div>
        <div class="kpi-sub">${rec.length} unpaid invoices</div>
      </div>
      <div class="kpi red">
        <div class="kpi-label">Total Payables</div>
        <div class="kpi-value red">${fmt(totalPay)}</div>
        <div class="kpi-sub">${pay.length} unpaid bills</div>
      </div>
      <div class="kpi ${netColor === 'green' ? 'white' : 'red'}">
        <div class="kpi-label">Net Position</div>
        <div class="kpi-value ${netColor}">${netPos >= 0 ? '+' : ''}${fmt(netPos)}</div>
        <div class="kpi-sub">Balance + Receivables − Payables</div>
      </div>
    </div>

    <div class="chart-panel">
      <div class="panel-title">60-Day Projected Balance</div>
      <div class="chart-hint">↖ Click any point for day detail</div>
      <canvas id="projChart" style="cursor:pointer"></canvas>
    </div>

    <div class="chart-panel">
      <div class="panel-title">Daily Cash In / Out</div>
      <canvas id="flowChart"></canvas>
    </div>

    <div class="two-col">
      <div class="chart-panel">
        <div class="panel-title">Bank Accounts</div>
        <div class="bank-list">
          ${bank.map(a => `
            <div class="bank-item">
              <div class="bank-name">${a.AccountName || '—'}</div>
              <div class="bank-balance">${fmt(a.CurrentBalance)}</div>
            </div>`).join('')}
        </div>
      </div>

      <div class="chart-panel">
        <div class="panel-title">Top Receivables</div>
        ${topRec.length === 0
          ? '<div style="font-size:10px;color:var(--text-dim);padding:20px 0">No unpaid invoices</div>'
          : `<table class="data-table">
              <thead><tr><th>Customer</th><th>Amount</th><th>Status</th></tr></thead>
              <tbody>
                ${topRec.map(r => `<tr>
                  <td>
                    <div class="td-main">${r.CustomerName || '—'}</div>
                    <div class="td-sub">${r.InvoiceNumber || ''} · ${r.DueDate || ''}</div>
                  </td>
                  <td class="amount-in">${fmt(r.BalanceAmount)}</td>
                  <td>${dayBadge(r.DaysUntilDue)}</td>
                </tr>`).join('')}
              </tbody>
            </table>`}
      </div>
    </div>

    <div class="chart-panel">
      <div class="panel-title">Top Payables</div>
      ${topPay.length === 0
          ? '<div style="font-size:10px;color:var(--text-dim);padding:20px 0">No unpaid bills</div>'
          : `<table class="data-table">
            <thead><tr><th>Vendor</th><th>Bill</th><th>Amount</th><th>Due Date</th><th>Status</th></tr></thead>
            <tbody>
              ${topPay.map(p => `<tr>
                <td>${p.VendorName || '—'}</td>
                <td class="td-sub">${p.BillNumber || '—'}</td>
                <td class="amount-out">${fmt(p.BalanceAmount)}</td>
                <td class="td-sub">${p.DueDate || '—'}</td>
                <td>${dayBadge(p.DaysUntilDue)}</td>
              </tr>`).join('')}
            </tbody>
          </table>`}
    </div>
  `;

      // ── PROJECTION CHART ─────────────────────────────────────────────────

      const projMax = Math.max(...balances);
      const projMin = Math.min(...balances);
      const yMax = Math.ceil(projMax * 1.3 / 10000) * 10000;
      const yMin = Math.min(0, Math.floor(projMin * 0.9 / 10000) * 10000);

      const critThreshold = Number(cfgMap['CriticalThreshold']) || 10000;
      const warnThreshold = Number(cfgMap['WarningThreshold']) || 20000;

      new Chart(document.getElementById('projChart'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            {
              label: 'Projected Balance',
              data: balances,
              borderColor: '#ffffff',
              backgroundColor: 'rgba(255,255,255,0.03)',
              borderWidth: 1.5,
              pointRadius: 0,
              pointHoverRadius: 5,
              pointHoverBackgroundColor: '#ffffff',
              tension: 0.3,
              fill: true
            },
            {
              label: `Critical (${fmt(critThreshold)})`,
              data: Array(labels.length).fill(critThreshold),
              borderColor: 'rgba(224,92,92,0.5)',
              borderWidth: 1,
              borderDash: [4, 4],
              pointRadius: 0,
              fill: false
            },
            {
              label: `Warning (${fmt(warnThreshold)})`,
              data: Array(labels.length).fill(warnThreshold),
              borderColor: 'rgba(232,168,56,0.4)',
              borderWidth: 1,
              borderDash: [4, 4],
              pointRadius: 0,
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { labels: { color: '#888888', font: { family: 'Nunito Sans', size: 9 }, boxWidth: 10 } },
            tooltip: {
              backgroundColor: '#0d0d0d',
              borderColor: 'rgba(255,255,255,0.15)',
              borderWidth: 1,
              titleColor: '#ffffff',
              bodyColor: '#e3e3db',
              callbacks: {
                label: ctx => ' ' + ctx.dataset.label + ': AED ' +
                  Math.abs(ctx.parsed.y).toLocaleString('en-AE', { maximumFractionDigits: 0 })
              }
            }
          },
          scales: {
            x: { ticks: { color: '#6b7c85', font: { family: 'Nunito Sans', size: 9 }, maxTicksLimit: 12 }, grid: { color: 'rgba(255,255,255,0.06)' } },
            y: {
              min: yMin, max: yMax,
              ticks: { color: '#6b7c85', font: { family: 'Nunito Sans', size: 9 }, callback: v => 'AED ' + (v / 1000).toFixed(0) + 'K' },
              grid: { color: 'rgba(255,255,255,0.06)' }
            }
          },
          onClick: (evt, elements, chart) => {
            const pts = chart.getElementsAtEventForMode(evt.native, 'index', { intersect: false }, false);
            if (pts.length) openModal(pts[0].index);
          }
        }
      });

      document.getElementById('projChart').style.height = '340px';
      document.getElementById('projChart').parentElement.style.minHeight = '400px';

      // ── CASH FLOW CHART ───────────────────────────────────────────────────

      const flowMax = Math.max(...cashIn, ...cashOut.map(Math.abs), 1);
      const flowY = Math.ceil(flowMax * 1.4 / 1000) * 1000;

      new Chart(document.getElementById('flowChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            {
              label: 'Cash In',
              data: cashIn,
              backgroundColor: 'rgba(126,200,160,0.6)',
              borderRadius: 1
            },
            {
              label: 'Cash Out',
              data: cashOut,
              backgroundColor: 'rgba(224,92,92,0.6)',
              borderRadius: 1
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: '#888888', font: { family: 'Nunito Sans', size: 9 }, boxWidth: 10 } },
            tooltip: {
              backgroundColor: '#0d0d0d',
              borderColor: 'rgba(255,255,255,0.15)',
              borderWidth: 1,
              titleColor: '#ffffff',
              bodyColor: '#e3e3db',
              callbacks: {
                label: ctx => ' ' + ctx.dataset.label + ': AED ' +
                  Math.abs(ctx.parsed.y).toLocaleString('en-AE', { maximumFractionDigits: 0 })
              }
            }
          },
          scales: {
            x: { ticks: { color: '#6b7c85', font: { family: 'Nunito Sans', size: 9 }, maxTicksLimit: 12 }, grid: { color: 'rgba(255,255,255,0.06)' } },
            y: {
              min: -flowY, max: flowY,
              ticks: { color: '#6b7c85', font: { family: 'Nunito Sans', size: 9 }, callback: v => 'AED ' + (v / 1000).toFixed(0) + 'K' },
              grid: { color: 'rgba(255,255,255,0.06)' }
            }
          }
        }
      });

      document.getElementById('flowChart').style.height = '260px';
      document.getElementById('flowChart').parentElement.style.minHeight = '320px';
    }

    // ═══════════════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════════════

    async function init() {
      try {
        const authed = await signIn();
        if (!authed) return;
        const data = await loadAllData();
        render(data);
      } catch (err) {
        document.getElementById('app').innerHTML = `
      <div class="loading">
        <div class="loading-box"><div class="loading-text" style="color:var(--red)">Error</div></div>
        <div class="loading-sub" style="color:var(--text-dim)">${err.message}</div>
        <button class="login-btn" onclick="init()" style="margin-top:16px">Retry</button>
      </div>`;
        console.error(err);
      }
    }

    init();
  </script>
